defaults:
  - ./config/vl_traj_envs@_here_
  - ./config/deepspeed_zero@_here_
  - ./config/deepspeed_zero2@_here_
  - ./config/deepspeed_zero3@_here_
  - ./config/deepspeed_zero3_cpuoffload@_here_

hydra:
  run:
    dir: .
  output_subdir: null


Model:  Qwen3-VL-8B-Instruct # GUI-Owl-1.5-8B-Instruct # Qwen3-VL-30B-A3B-Instruct # 
exp_name: ${Model}
seed: 42
logging_dir: ./output/logs
output_dir: ./output
render_save_dir: ./output/render
system_envs:
  USE_MODELSCOPE: '1'

# track_with: swanlab
# tracker_kwargs:
#   api_key: 4FsBwIEyUhCvOwlPJyr7g
#   project: GUIAgent-Online-RL
#   name: ${exp_name}
#   tags: 
#     - Markor
#     - JustNote
#     - Joplin
#   group: training
#   description: GUI online RL
#   log_dir: roll_exp/android


# ----------------------------------------------

# 训练/评估流程配置
max_steps: 1
save_steps: 1
logging_steps: 1
eval_steps: 1
resume_from_checkpoint: false
checkpoint_config:
  type: file_system
  output_dir: ckpt/${exp_name}


# 批处理大小与序列长度配置
rollout_batch_size: 91 # the rollout trajectory size，也就是一批任务的数量
val_batch_size: 4
# prompt_length
# response_length
sequence_length: 11000

# 分布式训练配置
# local_rank: 分布式训练中的本地排名（在当前节点内的排名）。
# num_nodes: 可用于分布式训练的节点（物理服务器）数量。如果设置为 1，则表示在单个节点上进行分布式训练。
num_gpus_per_node: 1


# 调度与请求管理
# generate_opt_level: 控制 LLM 生成（推理）的优化级别。设置为 0 时，使用基础批次生成接口；设置为 1 时，使用调度器处理请求。
# is_num_return_sequences_expand: 是否在提示（prompts）中复制 num_return_sequences 次。如果为 True，LLM 会为每个输入提示生成多个独立的响应，而不是只生成一个。
# max_running_requests: 在 LLM 推理服务器上可以同时处理的最大请求数量。这限制了并行推理的并发度。
# is_use_additional_prompts: 是否使用除常规批次大小之外的额外提示进行处理。
# max_additional_running_prompts: 在 batch_size 之外，可以额外运行的提示数量。这可能用于处理一些特殊或低优先级的请求，而不会阻塞主批次。

# PPO算法核心参数
enable_reference: true
advantage_clip: 0.2
ppo_epochs: 4
# GRPO core config
adv_estimator: "grpo"
pg_clip_high: 0.28
#pg_clip: 0.1
#dual_clip_loss: True
init_kl_coef:  0.001
whiten_advantages: true
entropy_loss_coef: 0
max_grad_norm: 1.0



# 预定义一些模型参数
pretrain: /HOME/hitsz_xdeng/hitsz_xdeng_2/HDD_POOL/Models/${Model}
# pretrain: /HOME/hitsz_xdeng/hitsz_xdeng_2/.cache/huggingface/hub/models--Qwen--Qwen3-VL-4B-Instruct/snapshots/ebb281ec70b05090aa6165b016eac8ec08e71b17


actor_infer:
  model_args:
    flash_attn: fa2
    disable_gradient_checkpointing: true
    dtype: bf16 # fp32 # 
  generating_args:
    max_new_tokens: 512 # single-turn response length
    top_p: 1.0
    top_k: 40
    num_beams: 1
    temperature: 0.0
    num_return_sequences: 1
  data_args:
    template: native
  strategy_args:
    strategy_name: vllm
    strategy_config:
      gpu_memory_utilization: 0.8
      block_size: 16
      load_format: auto
      max_model_len: 32768
  device_mapping: list(range(0,1))
  infer_batch_size: 1


reward_normalization:
  grouping: traj_group_id # 可以tags(env_type)/traj_group_id(group)/batch(rollout_batch)... group_by计算reward/adv
  norm_mean_type: group # batch / group
  method: mean
  # norm_std_type: batch

train_env_manager:
  max_env_num_per_worker: 32
  num_env_groups: 12
  # under the same group, the env config and env seed are ensured to be equal
  group_size: 1
  tags: [AndroidEnv-Train]
  num_groups_partition: [12] # If not set, all env names divide nums equally. Under the same group, the env config and env seed (prompt) are equal in each generation

val_env_manager:
  max_env_num_per_worker: 4
  num_env_groups: 2
  group_size: 2 # should be set to 1 because val temperature is set to 0 and same prompt leads to same output
  tags: [AndroidEnv-Val-Task]
  num_groups_partition: [2] # TODO: If not set, all env names divide nums equally. Under the same group, the env config and env seed (prompt) are equal in each generation

max_tokens_per_step: 512
adb_path: /root/android-sdk/platform-tools/adb #我的adb路径  "/root/android-sdk/platform-tools/adb"

START_CONSOLE_PORT: 5554
START_GRPC_PORT: 8554
max_actions_per_traj: 50






android_servers:
  server1:
    service_url: http://localhost:18000
    envs_num: 16
    console_ports: list(range(${START_CONSOLE_PORT}, ${START_CONSOLE_PORT}+2*8, 2))
    grpc_ports: list(range(${START_GRPC_PORT}, ${START_GRPC_PORT}+8))
    adb_path: /root/android-sdk/platform-tools/adb
    group_size: 1

  server2:
    service_url: http://localhost:18001
    envs_num: 8
    console_ports: list(range(${START_CONSOLE_PORT}+2, ${START_CONSOLE_PORT}+2+2*8, 2))
    grpc_ports: list(range(${START_GRPC_PORT}+2, ${START_GRPC_PORT}+2+8))
    adb_path: /data3/jiang_yicheng/android-sdk/platform-tools/adb
    group_size: 1

android_world: &android_world
  env_type: remote_multi_android
  max_steps: ${max_actions_per_traj}
  max_tokens_per_step: ${max_tokens_per_step}
  env_manager_cls: roll.pipeline.agentic.env_manager.android_step_env_manager.AndroidStepEnvManager
  use_thread_lock: false
  max_env_step_concurrent: 32
  env_config:
    task: all_task
    task_family: android_world
    max_image_tokens: 600
    env_configs:
      - service_url: ${android_servers.server1.service_url}
        envs_num: ${android_servers.server1.envs_num}
        console_ports: ${android_servers.server1.console_ports}
        grpc_ports: ${android_servers.server1.grpc_ports}
        adb_path: ${android_servers.server1.adb_path}

      # - service_url: ${android_servers.server2.service_url}
      #   envs_num: ${android_servers.server2.envs_num}
      #   console_ports: ${android_servers.server2.console_ports}
      #   grpc_ports: ${android_servers.server2.grpc_ports}
      #   adb_path: ${android_servers.server2.adb_path}

custom_envs:

  AndroidEnv-Train:
    <<: *android_world   # 直接完整复用

  AndroidEnv-Val-Task:
    <<: *android_world


